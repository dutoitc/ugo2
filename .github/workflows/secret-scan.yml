name: Secret scan

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '17 4 * * 1'

permissions:
  contents: read

jobs:
  commits:
    name: Git history
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  review-archive:
    name: Review archive
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Create archive
        run: ARCHIVE=ugo2-review.tgz ./createArchive.sh
      - name: Extract archive
        run: |
          mkdir -p .secret-scan/archive
          tar -xzf ugo2-review.tgz -C .secret-scan/archive
      - name: Scan extracted content
        run: >-
          docker run --rm
          -v "$PWD/.secret-scan/archive:/scan:ro"
          ghcr.io/gitleaks/gitleaks:v8.30.1
          dir --redact --no-banner /scan
